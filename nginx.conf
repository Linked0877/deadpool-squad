server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression pour les fichiers texte uniquement (HTML/CSS/JS/JSON/SVG).
    # Volontairement PAS appliquée aux médias (mp3/wav/jpg/png...) : ils sont
    # déjà compressés, et la compression à la volée casserait le support des
    # requêtes "Range" utilisées par les lecteurs audio/vidéo HTML5.
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Cache long pour les fichiers JS/CSS générés par Angular (ils sont
    # versionnés via un hash dans leur nom, donc sûrs à mettre en cache "immutable")
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache modéré pour les images et fichiers audio (pas "immutable" car vous
    # pourriez remplacer un fichier en gardant le même nom)
    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico|mp3|wav|ogg|m4a)$ {
        add_header Cache-Control "public, max-age=2592000";
    }

    # Toutes les routes inconnues retombent sur index.html : c'est Angular
    # (et son routeur côté client) qui décide quoi afficher
    location / {
        try_files $uri $uri/ /index.html;
    }

    # En-têtes de sécurité basiques
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
}
