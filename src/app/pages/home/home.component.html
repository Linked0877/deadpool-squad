<div class="home">

  <!-- Header label -->
  <header class="home__header">
    <div class="home__header-line"></div>
    <span class="home__header-label">MÉMORIAL // ARCHIVES</span>
    <div class="home__header-line"></div>
  </header>

  <!-- Logo -->
  <div class="home__logo-wrap">
    <div class="home__logo">
      <img src="assets/images/logo.png" alt="Deadpool Squad" class="home__logo-img">
    </div>
  </div>

  <!-- Title -->
  <h1 class="home__title">DEADPOOL SQUAD</h1>

  <!-- Nav -->
  <nav class="home__nav">
    <a routerLink="/videos" class="home__nav-link">VIDÉOS</a>
    <span class="home__nav-sep"> // </span>
    <a routerLink="/soundbox" class="home__nav-link">SOUNDBOX</a>
    <span class="home__nav-sep"> // </span>
    <span class="home__nav-link home__nav-link--disabled">SOUVENIRS</span>
  </nav>

  <div class="home__divider"></div>

  <!-- Description -->
  <p class="home__description">
    Les archives du Deadpool Squad — victoires épiques, moments cultes<br class="d-none d-md-inline">
    et fous rires immortalisés pour l'éternité.
  </p>

  <!-- Cards -->
  <div class="container home__cards">
    <div class="row g-4 justify-content-center">

      <div class="col-12 col-md-5">
        <a routerLink="/videos" class="ds-card">
          <div class="ds-card__icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
              <path d="M0 5a2 2 0 0 1 2-2h7.5a2 2 0 0 1 1.983 1.738l3.11-1.382A1 1 0 0 1 16 4.269v7.462a1 1 0 0 1-1.406.913l-3.111-1.382A2 2 0 0 1 9.5 13H2a2 2 0 0 1-2-2z"/>
            </svg>
          </div>
          <div class="ds-card__body">
            <span class="ds-card__label">ACCÈS</span>
            <h2 class="ds-card__title">VIDEOS</h2>
            <p class="ds-card__text">Toutes les vidéos du clan</p>
          </div>
          <div class="ds-card__corner"></div>
        </a>
      </div>

      <div class="col-12 col-md-5">
        <a routerLink="/soundbox" class="ds-card">
          <div class="ds-card__icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
              <path d="M8.5 2a.5.5 0 0 1 .5.5v11a.5.5 0 0 1-1 0v-11a.5.5 0 0 1 .5-.5m-2 2a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 .5-.5m4 0a.5.5 0 0 1 .5.5v7a.5.5 0 0 1-1 0v-7a.5.5 0 0 1 .5-.5m-6 1.5A.5.5 0 0 1 5 6v4a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m8 0a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m-10 1A.5.5 0 0 1 3 7v2a.5.5 0 0 1-1 0V7a.5.5 0 0 1 .5-.5m12 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0V7a.5.5 0 0 1 .5-.5"/>
            </svg>
          </div>
          <div class="ds-card__body">
            <span class="ds-card__label">ACCÈS</span>
            <h2 class="ds-card__title">SOUNDBOX</h2>
            <p class="ds-card__text">Répliques et moments cultes</p>
          </div>
          <div class="ds-card__corner"></div>
