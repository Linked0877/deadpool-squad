# Ceci est un EXTRAIT à ajouter à votre docker-compose.yml existant
# (celui qui fait déjà tourner Traefik et vos autres sites), pas un fichier autonome.
#
# Workflow de mise à jour :
#   1. En local : ./deploiement.sh  (build + push vers Docker Hub)
#   2. Sur le VPS : ./deploiement-vps.sh

services:
  deadpool-squad:
    image: linked59/deadpool-squad:latest
    container_name: deadpool-squad
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # Router HTTP
      - "traefik.http.routers.deadpool-squad-http.rule=Host(`deadpool-squad-legacy.eldevia.fr`)"
      - "traefik.http.routers.deadpool-squad-http.entrypoints=web"

      # Router HTTPS
      - "traefik.http.routers.deadpool-squad-https.rule=Host(`deadpool-squad-legacy.eldevia.fr`)"
      - "traefik.http.routers.deadpool-squad-https.entrypoints=websecure"
      - "traefik.http.routers.deadpool-squad-https.tls=true"
      - "traefik.http.routers.deadpool-squad-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.deadpool-squad.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
